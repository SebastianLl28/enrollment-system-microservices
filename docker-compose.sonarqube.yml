# SonarQube (Community) con su propia base de datos, separado del stack
# principal para no encarecer `make up`. Uso:
#   make sonar-up    -> levanta el servidor (http://localhost:9000)
#   make sonar       -> corre tests + análisis (necesita SONAR_TOKEN en .env)
#   make sonar-down  -> lo apaga (los datos persisten en volúmenes)
services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      db-postgres-sonar:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db-postgres-sonar:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  db-postgres-sonar:
    image: postgres:16-alpine
    container_name: db-postgres-sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db:
