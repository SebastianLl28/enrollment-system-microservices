name: build-and-push

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NAMESPACE: sllamuca

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: api-gateway,          context: ., dockerfile: ./api-gateway/Dockerfile }
          - { service: discovery-server,     context: ., dockerfile: ./discovery-server/Dockerfile }
          - { service: authorization-server, context: ., dockerfile: ./authorization-server/Dockerfile }
          - { service: enrollment-server,    context: ., dockerfile: ./enrollment-server/Dockerfile }
          - { service: notification-server,  context: ., dockerfile: ./notification-server/Dockerfile }
          - { service: event-store-server,   context: ., dockerfile: ./event-store-server/Dockerfile }
          - service: frontend-client
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build-args: |
              VITE_AUTH_BASE_URL=
              VITE_API_URL=
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Analyze
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=enrollment-system-microservices \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: target/sonar/report-task.txt

  deploy:
    needs: [build, quality-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy en la VM por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/enrollment-system-microservices
            git pull
            docker compose pull
            docker compose up -d
            docker image prune -f
