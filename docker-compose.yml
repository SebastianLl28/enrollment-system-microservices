services:

  frontend-client:
    image: sllamuca/frontend-client:${TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_AUTH_BASE_URL: ""
        VITE_API_URL: ""
    container_name: frontend-client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api-gateway
    networks:
      - backend-network
    restart: unless-stopped

  # ---------- Discovery (Eureka) ----------
  discovery-server:
    image: sllamuca/discovery-server:${TAG:-latest}
    build:
      context: .
      dockerfile: ./discovery-server/Dockerfile
    container_name: discovery-server
    networks:
      - backend-network
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- DB ----------
  postgres-enrollment:
    image: postgres:16-alpine
    container_name: db-postgres-enrollment
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - enrollment_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-auth:
    image: postgres:16-alpine
    container_name: db-postgres-auth
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_AUTH_USER} -d ${DB_AUTH_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-events:
    image: postgres:16-alpine
    container_name: db-postgres-events
    environment:
      POSTGRES_USER: ${DB_EVENTS_USER}
      POSTGRES_PASSWORD: ${DB_EVENTS_PASSWORD}
      POSTGRES_DB: ${DB_EVENTS_NAME}
    volumes:
      - events_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_EVENTS_USER} -d ${DB_EVENTS_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- MESSAGE ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Solo listener interno (los microservicios usan kafka:9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - backend-network
    restart: unless-stopped

  # ---------- Microservices ----------
  authorization-server:
    image: sllamuca/authorization-server:${TAG:-latest}
    build:
      context: .
      dockerfile: ./authorization-server/Dockerfile
    container_name: authorization-server
    hostname: authorization-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_AUTH_HOST: ${DB_AUTH_HOST}
      DB_AUTH_PORT: ${DB_AUTH_PORT}
      DB_AUTH_NAME: ${DB_AUTH_NAME}
      DB_AUTH_USER: ${DB_AUTH_USER}
      DB_AUTH_PASSWORD: ${DB_AUTH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_TWO_FACTOR_EXPIRATION: ${TWO_FACTOR_EXPIRATION}
      TWO_FACTOR_ISSUER: ${TWO_FACTOR_ISSUER}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      OAUTH2_PUBLIC_BASE_URL: ${OAUTH2_PUBLIC_BASE_URL}
      EUREKA_URI: ${EUREKA_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  enrollment-server:
    image: sllamuca/enrollment-server:${TAG:-latest}
    build:
      context: .
      dockerfile: ./enrollment-server/Dockerfile
    container_name: enrollment-server
    hostname: enrollment-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_ENROLLMENT_EVENTS_TOPIC: ${KAFKA_ENROLLMENT_EVENTS_TOPIC}
      EUREKA_URI: ${EUREKA_URI}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      MP_BACK_URLS_BASE: ${MP_BACK_URLS_BASE:-http://localhost:5173/payments}
      MP_ENROLLMENT_FEE: ${MP_ENROLLMENT_FEE:-150.00}
      MP_CURRENCY_ID: ${MP_CURRENCY_ID:-PEN}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-enrollment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  api-gateway:
    image: sllamuca/api-gateway:${TAG:-latest}
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URI: ${EUREKA_URI}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_AUDIT_LOGS_TOPIC: ${KAFKA_AUDIT_LOGS_TOPIC}
    depends_on:
      discovery-server:
        condition: service_healthy
      authorization-server:
        condition: service_healthy
      enrollment-server:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  notification-server:
    image: sllamuca/notification-server:${TAG:-latest}
    build:
      context: .
      dockerfile: ./notification-server/Dockerfile
    container_name: notification-server
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_URI}
      KAFKA_ENROLLMENT_EVENTS_TOPIC: ${KAFKA_ENROLLMENT_EVENTS_TOPIC}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  event-store-server:
    image: sllamuca/event-store-server:${TAG:-latest}
    build:
      context: .
      dockerfile: ./event-store-server/Dockerfile
    container_name: event-store-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_EVENTS_HOST: ${DB_EVENTS_HOST}
      DB_EVENTS_PORT: ${DB_EVENTS_PORT}
      DB_EVENTS_NAME: ${DB_EVENTS_NAME}
      DB_EVENTS_USER: ${DB_EVENTS_USER}
      DB_EVENTS_PASSWORD: ${DB_EVENTS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_AUDIT_LOGS_TOPIC: ${KAFKA_AUDIT_LOGS_TOPIC}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET}
      EUREKA_URI: ${EUREKA_URI}
    depends_on:
      postgres-events:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------- Observer ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=${PROMETHEUS_EXTERNAL_URL}"
      - "--web.route-prefix=/prometheus"
    networks:
      - backend-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - backend-network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - backend-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.6.11
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  enrollment_data:
  auth_data:
  events_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  backend-network:
    driver: bridge
